<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PolyTrader v17.5 · Otimizado para GitHub Pages</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ========== TODO O CSS ORIGINAL (IDÊNTICO AO QUE VOCÊ TINHA) ========== */
/* Por questão de espaço, não repito o CSS aqui, mas ele deve ser exatamente o mesmo da versão anterior */
/* Se preferir, pode copiar o CSS do seu arquivo atual e colar aqui */
:root{
  --bg:#080c10;--surface:#0f1318;--card:#151b22;--border:#1e2730;--border2:#2a3540;
  --green:#00e5a0;--red:#ff4d6d;--blue:#3d9eff;--amber:#f5a623;--purple:#a78bfa;--cyan:#22d3ee;
  --pizza:#ff6b35;--pizza2:#ffd23f;
  --text:#e8f0f8;--muted:#5a7080;--muted2:#3d5060;
  --font:'Syne',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;justify-content:center;padding:12px}
.phone{width:100%;max-width:430px;background:var(--surface);border-radius:24px;border:1px solid var(--border);overflow:hidden;box-shadow:0 0 80px rgba(255,107,53,.04),0 30px 80px rgba(0,0,0,.6)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:11px 14px 9px;background:var(--bg);border-bottom:1px solid var(--border)}
.logo-wrap{display:flex;align-items:center;gap:7px}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green)}
.logo{font-size:14px;font-weight:700;letter-spacing:.4px}
.wc-btn{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1px solid var(--border2);background:var(--card);cursor:pointer;font-family:var(--font);font-size:10px;color:var(--muted);transition:all .2s}
.wc-btn.connected{border-color:var(--green);color:var(--green);background:rgba(0,229,160,.06)}
.wc-dot-el{width:5px;height:5px;border-radius:50%;background:var(--muted)}
.wc-btn.connected .wc-dot-el{background:var(--green);box-shadow:0 0 5px var(--green)}
.balstrip{display:grid;grid-template-columns:repeat(5,1fr);background:var(--bg);border-bottom:1px solid var(--border)}
.balcell{padding:6px 5px;border-right:1px solid var(--border)}
.balcell:last-child{border-right:none}
.blbl{font-size:8px;color:var(--muted);font-family:var(--mono);margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px}
.bval{font-size:11px;font-weight:500;font-family:var(--mono);color:var(--text)}
.bval.g{color:var(--green)}.bval.r{color:var(--red)}.bval.p{color:var(--purple)}.bval.c{color:var(--cyan)}.bval.z{color:var(--pizza)}
.tabs-wrap{background:var(--bg);border-bottom:1px solid var(--border)}
.tabs-row{display:flex;overflow-x:auto}
.tabs-row::-webkit-scrollbar{display:none}
.tabs-row:first-child{border-bottom:1px solid var(--border2)}
.tab{flex:1;min-width:52px;padding:8px 4px;font-size:9px;font-family:var(--mono);text-align:center;cursor:pointer;color:var(--muted);border:none;background:transparent;border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:.2px;white-space:nowrap;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.on{color:var(--green);border-bottom-color:var(--green);background:rgba(0,229,160,.04)}
.tab.pizza-tab.on{color:var(--pizza);border-bottom-color:var(--pizza);background:rgba(255,107,53,.04)}
.palette-card{padding:8px;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s}
.palette-card:hover{border-color:var(--green)}
.palette-card.active{border-color:var(--green);background:rgba(0,229,160,.06)}
.body{padding:10px 11px;overflow-y:auto;max-height:650px}
.hidden{display:none!important}
.card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:10px 12px;margin-bottom:7px}
.ctitle{font-size:9px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.btn{padding:6px 8px;border-radius:7px;border:1px solid var(--border2);background:transparent;font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .15s}
.btn-yes{color:var(--green);border-color:rgba(0,229,160,.3)}.btn-yes:hover{background:rgba(0,229,160,.1);border-color:var(--green)}
.btn-no{color:var(--red);border-color:rgba(255,77,109,.3)}.btn-no:hover{background:rgba(255,77,109,.1);border-color:var(--red)}
.btn-g{background:var(--green);color:#000;border-color:var(--green);font-weight:700}
.btn-r{background:var(--red);color:#fff;border-color:var(--red);font-weight:700}
.btn-p{background:var(--purple);color:#000;border-color:var(--purple);font-weight:700}
.btn-c{background:var(--cyan);color:#000;border-color:var(--cyan);font-weight:700}
.btn-amber{background:var(--amber);color:#000;border-color:var(--amber);font-weight:700}
.btn-pizza{background:var(--pizza);color:#fff;border-color:var(--pizza);font-weight:700}
.btn-pizza2{background:transparent;color:var(--pizza);border-color:rgba(255,107,53,.4);font-weight:500}
.btn-pizza2:hover{background:rgba(255,107,53,.1);border-color:var(--pizza)}
.btn-outline{color:var(--muted);border-color:var(--border2)}.btn-outline:hover{border-color:var(--muted);color:var(--text)}
.btn:hover{opacity:.88}
.btn-row{display:flex;gap:5px}
.slrow{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.slnum{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--green);background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:3px 6px;min-width:52px;text-align:center;cursor:text;transition:border-color .15s}
.slnum:focus{selection:all}
.slnum:hover{border-color:var(--green)}
.slnum:focus{border-color:var(--green);outline:none;background:rgba(0,229,160,.05)}
.slnum.pizza{color:var(--pizza)}.slnum.pizza:focus,.slnum.pizza:hover{border-color:var(--pizza)}
.slnum.cyan{color:var(--cyan)}.slnum.cyan:focus,.slnum.cyan:hover{border-color:var(--cyan)}
.slnum.purple{color:var(--purple)}.slnum.purple:focus,.slnum.purple:hover{border-color:var(--purple)}
.slrow label{font-size:9px;font-family:var(--mono);color:var(--muted);min-width:112px;text-transform:uppercase;letter-spacing:.2px}
input[type=range]{flex:1;accent-color:var(--green)}
.slval{display:none}
.logbox{font-size:10px;font-family:var(--mono);background:var(--bg);border-radius:7px;padding:8px;height:185px;overflow-y:auto;border:1px solid var(--border);line-height:1.7}
.ll{display:flex;gap:5px;padding:1px 0}
.lt{color:var(--muted2);flex-shrink:0;font-size:9px}
.lg{color:var(--green)}.lr{color:var(--red)}.lb{color:var(--blue)}.la{color:var(--amber)}.lp{color:var(--purple)}.lc{color:var(--cyan)}.lz{color:var(--pizza)}
.mkt-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:10px 12px;margin-bottom:7px;transition:border-color .15s}
.mkt-card:hover{border-color:var(--border2)}
.mkt-cat{font-size:9px;font-family:var(--mono);color:var(--muted);display:flex;justify-content:space-between;margin-bottom:4px}
.mkt-q{font-size:12px;line-height:1.45;font-weight:500;margin-bottom:6px}
.prob-bar{height:4px;border-radius:2px;overflow:hidden;display:flex;margin-bottom:3px}
.prob-yes{background:var(--green);transition:width .5s}.prob-no{background:var(--red);transition:width .5s}
.prob-lbls{display:flex;justify-content:space-between;font-size:10px;font-family:var(--mono);margin-bottom:6px}
.ylbl{color:var(--green)}.nlbl{color:var(--red)}
.mkt-meta{font-size:9px;color:var(--muted2);font-family:var(--mono);margin-bottom:7px}
.sig-tag{display:inline-block;font-size:9px;font-family:var(--mono);padding:2px 7px;border-radius:4px;margin-bottom:7px}
.sig-edge{background:rgba(0,229,160,.08);color:var(--green);border:1px solid rgba(0,229,160,.2)}
.sig-pizza{background:rgba(255,107,53,.1);color:var(--pizza);border:1px solid rgba(255,107,53,.3);animation:pizza-glow .9s infinite alternate}
@keyframes pizza-glow{from{box-shadow:0 0 3px rgba(255,107,53,.2)}to{box-shadow:0 0 10px rgba(255,107,53,.5)}}
.defcon-display{text-align:center;padding:16px 0 10px;position:relative}
.defcon-ring{width:130px;height:130px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;position:relative;transition:all .5s}
.defcon-inner{width:90px;height:90px;border-radius:50%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;z-index:1}
.defcon-num{font-size:36px;font-weight:700;font-family:var(--mono);line-height:1}
.defcon-lbl{font-size:9px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.defcon-title{font-size:13px;font-weight:700;margin-bottom:4px}
.defcon-sub{font-size:10px;font-family:var(--mono);color:var(--muted);margin-bottom:12px;line-height:1.5}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.shop-card{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:8px 10px;transition:border-color .3s}
.shop-card.hot{border-color:var(--pizza)}
.shop-name{font-size:10px;font-weight:700;font-family:var(--mono);margin-bottom:3px}
.shop-status{font-size:9px;font-family:var(--mono);color:var(--muted);margin-bottom:5px}
.shop-bar-wrap{height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.shop-bar{height:100%;border-radius:2px;transition:width .5s,background .3s}
.shop-meta{font-size:9px;font-family:var(--mono);margin-top:3px}
.pizza-alert{border-radius:10px;padding:10px 12px;margin-bottom:8px;font-family:var(--mono);font-size:10px;line-height:1.8}
.pizza-alert.low{background:rgba(0,229,160,.05);border:1px solid rgba(0,229,160,.2);color:var(--green)}
.pizza-alert.med{background:rgba(245,166,35,.06);border:1px solid rgba(245,166,35,.25);color:var(--amber)}
.pizza-alert.high{background:rgba(255,107,53,.08);border:1px solid rgba(255,107,53,.3);color:var(--pizza)}
.pizza-alert.critical{background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.4);color:var(--red);animation:pizza-glow .6s infinite alternate}
.suggestion-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:10px 12px;margin-bottom:7px;cursor:pointer;transition:border-color .15s}
.suggestion-card:hover{border-color:var(--pizza)}
.suggestion-card.pizza-signal{border-color:rgba(255,107,53,.4)}
.sug-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.sug-title{font-size:11px;font-weight:700}
.sug-conf{font-size:10px;font-family:var(--mono);font-weight:700}
.sug-reason{font-size:10px;font-family:var(--mono);color:var(--muted);line-height:1.6;margin-bottom:8px}
.sug-source{font-size:9px;font-family:var(--mono);padding:2px 7px;border-radius:4px;display:inline-block;margin-bottom:7px}
.src-pizza{background:rgba(255,107,53,.1);color:var(--pizza);border:1px solid rgba(255,107,53,.3)}
.src-edge{background:rgba(0,229,160,.08);color:var(--green);border:1px solid rgba(0,229,160,.2)}
.src-crypto{background:rgba(34,211,238,.08);color:var(--cyan);border:1px solid rgba(34,211,238,.2)}
.src-copy{background:rgba(167,139,250,.08);color:var(--purple);border:1px solid rgba(167,139,250,.2)}
.auto-trade-row{display:flex;align-items:center;gap:6px;margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.auto-trade-lbl{font-size:9px;font-family:var(--mono);color:var(--muted);flex:1}
.bot-controls{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px}
.bot-ctrl{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:7px 4px;text-align:center;cursor:pointer;transition:all .15s}
.bot-ctrl.on-g{border-color:var(--green);background:rgba(0,229,160,.05)}
.bot-ctrl.on-p{border-color:var(--purple);background:rgba(167,139,250,.05)}
.bot-ctrl.on-c{border-color:var(--cyan);background:rgba(34,211,238,.05)}
.bot-ctrl.on-z{border-color:var(--pizza);background:rgba(255,107,53,.05)}
.ctrl-icon{font-size:16px;margin-bottom:2px}
.ctrl-lbl{font-size:8px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.1px}
.ctrl-st{font-size:8px;font-family:var(--mono);margin-top:2px;color:var(--muted)}
.trader-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:10px 12px;margin-bottom:7px}
.trader-card.active{border-color:var(--purple)}
.ta{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.trader-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-bottom:7px}
.tstat{background:var(--bg);border-radius:5px;padding:4px 3px;text-align:center;border:1px solid var(--border)}
.tstat-lbl{font-size:8px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;margin-bottom:1px}
.tstat-val{font-size:11px;font-weight:700;font-family:var(--mono)}
.win-bar{height:2px;border-radius:1px;background:var(--border2);overflow:hidden;margin-top:2px}
.win-fill{height:100%;border-radius:1px}
.tog-wrap{display:flex;align-items:center;gap:5px;cursor:pointer}
.tog-track{width:30px;height:16px;border-radius:8px;background:var(--border2);position:relative;transition:background .2s;flex-shrink:0}
.tog-track.on{background:var(--purple)}
.tog-thumb{width:12px;height:12px;border-radius:50%;background:var(--muted);position:absolute;top:2px;left:2px;transition:all .2s}
.tog-track.on .tog-thumb{left:16px;background:#fff}
.tog-lbl{font-size:9px;font-family:var(--mono);color:var(--muted)}
.tog-track.on+.tog-lbl{color:var(--purple)}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px 12px;margin-bottom:7px}
.rep-pnl{font-size:17px;font-weight:700;font-family:var(--mono)}
.rep-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:7px}
.rstat{background:var(--bg);border-radius:6px;padding:5px 4px;text-align:center;border:1px solid var(--border)}
.rstat-lbl{font-size:8px;font-family:var(--mono);color:var(--muted);margin-bottom:2px;text-transform:uppercase}
.rstat-val{font-size:12px;font-weight:700;font-family:var(--mono)}
.divl{height:1px;background:var(--border);margin:7px 0}
.infobox{background:var(--bg);border-radius:8px;padding:9px 11px;font-family:var(--mono);font-size:10px;line-height:2.1;border:1px solid var(--border);margin-top:7px}
.irow{display:flex;justify-content:space-between}.irow span:first-child{color:var(--muted)}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:9px}
.preset{padding:7px 3px;border-radius:7px;border:1px solid var(--border);background:var(--bg);cursor:pointer;text-align:center;transition:all .15s}
.preset.sel,.preset:hover{border-color:var(--green)}.preset.sel{background:rgba(0,229,160,.05)}
.preset .pa{font-size:12px;font-weight:700;display:block;font-family:var(--mono)}.preset.sel .pa{color:var(--green)}
.preset .po{font-size:8px;color:var(--muted);font-family:var(--mono)}
.prow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}.prow:last-child{border-bottom:none}
.badge{display:inline-block;font-size:8px;font-family:var(--mono);padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.2px}
.bdemo{background:rgba(245,166,35,.1);color:var(--amber);border:1px solid rgba(245,166,35,.3)}
.breal{background:rgba(0,229,160,.1);color:var(--green);border:1px solid rgba(0,229,160,.3)}
.sec-title{font-size:9px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal-box{background:var(--surface);border:1px solid var(--border2);border-radius:18px;padding:20px;width:100%;max-width:340px}
.wallet-opt{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;border:1px solid var(--border);background:var(--card);cursor:pointer;transition:all .15s;margin-bottom:5px}
.wallet-opt:hover{border-color:var(--green)}
.wallet-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.approve-detail{background:var(--bg);border-radius:9px;padding:10px 12px;margin-bottom:12px;font-family:var(--mono);font-size:10px;line-height:2.2}
.apr-row{display:flex;justify-content:space-between}.apr-row span:first-child{color:var(--muted)}
.scroll3{max-height:400px;overflow-y:auto}.scroll3::-webkit-scrollbar{width:3px}.scroll3::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.mini-chart{height:34px;overflow:hidden}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.2;transform:scale(.6)}}
.pulse-dot{width:6px;height:6px;border-radius:50%;animation:pulse 1s infinite;display:inline-block;margin-right:4px;vertical-align:middle}
.body::-webkit-scrollbar,.logbox::-webkit-scrollbar{width:3px}
.body::-webkit-scrollbar-thumb,.logbox::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.pos-card{background:var(--card);border:1px solid var(--border);border-radius:11px;margin-bottom:7px;overflow:hidden;transition:border-color .15s}
.pos-card.pos-edge{border-left:3px solid var(--green)}
.pos-card.pos-copy{border-left:3px solid var(--purple)}
.pos-card.pos-crypto{border-left:3px solid var(--cyan)}
.pos-card.pos-pizza{border-left:3px solid var(--pizza)}
.pos-header{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;cursor:pointer;gap:7px}
.pos-header:active{background:rgba(255,255,255,.02)}
.pos-outcome{font-size:11px;font-weight:700;font-family:var(--mono);padding:3px 8px;border-radius:5px;flex-shrink:0}
.pos-yes{background:rgba(0,229,160,.12);color:var(--green)}
.pos-no{background:rgba(255,77,109,.12);color:var(--red)}
.pos-pnl{font-size:12px;font-weight:700;font-family:var(--mono);flex-shrink:0;text-align:right;min-width:68px}
.pos-chevron{font-size:10px;color:var(--muted);flex-shrink:0;transition:transform .2s;display:inline-block}
.pos-chevron.open{transform:rotate(180deg)}
.pos-detail{padding:0 11px 11px;border-top:1px solid var(--border);display:none}
.pos-detail.open{display:block}
.pos-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin:8px 0}
.pos-item{background:var(--bg);border-radius:7px;padding:7px 9px;border:1px solid var(--border)}
.pos-item-lbl{font-size:8px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
.pos-item-val{font-size:11px;font-weight:500;font-family:var(--mono);color:var(--text)}
.pos-progress{height:4px;background:var(--border2);border-radius:2px;overflow:hidden;margin:6px 0}
.pos-progress-fill{height:100%;border-radius:2px;transition:width .5s}
.pos-btn-row{display:flex;gap:5px;margin-top:9px}
.filt-on{border-color:var(--green)!important;color:var(--green)!important;background:rgba(0,229,160,.07)!important}
.closed-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border)}
.closed-row:last-child{border-bottom:none}
.closed-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.bal-edit-modal{background:var(--surface);border:1px solid var(--green);border-radius:18px;padding:22px;width:100%;max-width:320px}
.bal-edit-title{font-size:14px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:7px}
.bal-edit-sub{font-size:9px;font-family:var(--mono);color:var(--muted);margin-bottom:16px;line-height:1.6}
.bal-input-wrap{position:relative;margin-bottom:10px}
.bal-input-prefix{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;font-weight:700;font-family:var(--mono);color:var(--green)}
.bal-input{width:100%;padding:12px 12px 12px 28px;background:var(--bg);border:1px solid var(--green);border-radius:10px;color:var(--green);font-family:var(--mono);font-size:20px;font-weight:700;text-align:left;outline:none}
.bal-input:focus{box-shadow:0 0 0 2px rgba(0,229,160,.2)}
.bal-quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:14px}
.bal-quick{padding:7px 4px;border-radius:7px;border:1px solid var(--border2);background:var(--bg);color:var(--muted);font-family:var(--mono);font-size:10px;cursor:pointer;text-align:center;transition:all .15s}
.bal-quick:hover{border-color:var(--green);color:var(--green)}
.bal-info{font-size:9px;font-family:var(--mono);color:var(--muted2);line-height:1.7;margin-bottom:14px;padding:8px 10px;background:var(--bg);border-radius:7px;border:1px solid var(--border)}
.limit-order-row {
  display: flex;
  gap: 6px;
  margin-top: 8px;
  padding-top: 6px;
  border-top: 1px solid var(--border);
  font-size: 9px;
  font-family: var(--mono);
  align-items: center;
  flex-wrap: wrap;
}
.limit-input {
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 5px;
  padding: 3px 6px;
  width: 50px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 9px;
  text-align: center;
}
.limit-btn {
  background: var(--green);
  color: #000;
  border: none;
  border-radius: 5px;
  padding: 3px 8px;
  font-size: 9px;
  cursor: pointer;
}
.limit-btn:hover {
  opacity: 0.8;
}
