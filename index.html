<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>PolyTrader v18 · Weather Bot (Kelly/Softmax/Bayes)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c10;--surface:#0f1318;--card:#151b22;--border:#1e2730;--border2:#2a3540;
  --green:#00e5a0;--red:#ff4d6d;--blue:#3d9eff;--amber:#f5a623;--purple:#a78bfa;--cyan:#22d3ee;
  --pizza:#ff6b35;--pizza2:#ffd23f;
  --text:#e8f0f8;--muted:#5a7080;--muted2:#3d5060;
  --font:'Syne',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;justify-content:center;padding:12px;line-height:1.4}
.phone{width:100%;max-width:430px;background:var(--surface);border-radius:24px;border:1px solid var(--border);overflow:hidden;box-shadow:0 0 80px rgba(255,107,53,.04),0 30px 80px rgba(0,0,0,.6);display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:11px 14px 9px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.logo-wrap{display:flex;align-items:center;gap:7px}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.logo{font-size:14px;font-weight:700;letter-spacing:.4px}
.wc-btn{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1px solid var(--border2);background:var(--card);cursor:pointer;font-family:var(--font);font-size:10px;color:var(--muted);transition:all .2s}
.wc-btn:hover{border-color:var(--green);color:var(--green)}
.wc-btn.connected{border-color:var(--green);color:var(--green);background:rgba(0,229,160,.06)}
.wc-dot-el{width:5px;height:5px;border-radius:50%;background:var(--muted)}
.wc-btn.connected .wc-dot-el{background:var(--green);box-shadow:0 0 5px var(--green)}
.balstrip{display:grid;grid-template-columns:repeat(5,1fr);background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.balcell{padding:6px 5px;border-right:1px solid var(--border);text-align:center;cursor:default}
.balcell:last-child{border-right:none}
.blbl{font-size:8px;color:var(--muted);font-family:var(--mono);margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px}
.bval{font-size:11px;font-weight:500;font-family:var(--mono);color:var(--text)}
.bval.g{color:var(--green)}.bval.r{color:var(--red)}.bval.p{color:var(--purple)}.bval.c{color:var(--cyan)}.bval.z{color:var(--pizza)}
.tabs-wrap{background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.tabs-row{display:flex;overflow-x:auto;scrollbar-width:none}
.tabs-row::-webkit-scrollbar{display:none}
.tabs-row:first-child{border-bottom:1px solid var(--border2)}
.tab{flex:1;min-width:52px;padding:8px 4px;font-size:9px;font-family:var(--mono);text-align:center;cursor:pointer;color:var(--muted);border:none;background:transparent;border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:.2px;white-space:nowrap;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.on{color:var(--green);border-bottom-color:var(--green);background:rgba(0,229,160,.04)}
.tab.pizza-tab.on{color:var(--pizza);border-bottom-color:var(--pizza);background:rgba(255,107,53,.04)}
.body{flex:1;overflow-y:auto;padding:10px;background:linear-gradient(180deg,transparent,rgba(0,0,0,.1))}
.hidden{display:none!important}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px;margin-bottom:10px}
.ctitle{font-size:11px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.badge{font-size:8px;font-family:var(--mono);padding:2px 8px;border-radius:10px;background:var(--border2);color:var(--muted)}
.btn{width:100%;padding:9px 12px;border:none;border-radius:10px;font-family:var(--font);font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.3px}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.btn:active{transform:translateY(0)}.btn-g{background:linear-gradient(135deg,var(--green),#00c48a);color:#000}
.btn-r{background:linear-gradient(135deg,var(--red),#e03d5a);color:#fff}
.btn-c{background:linear-gradient(135deg,var(--cyan),#00bcd4);color:#000}
.btn-p{background:linear-gradient(135deg,var(--purple),#8b73d4);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text)}
.btn-outline:hover{border-color:var(--green);color:var(--green)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
.sec-title{font-size:10px;font-weight:700;color:var(--muted);margin:0 0 8px 2px;text-transform:uppercase;letter-spacing:.4px}
.slrow{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:6px 0}
.slrow label{flex:1;font-size:9px;font-family:var(--mono);color:var(--muted)}
.slrow input[type="range"]{flex:2;accent-color:var(--green);cursor:pointer}
.slrow input[type="number"]{width:55px;padding:4px 6px;border:1px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:9px;text-align:right}
.slnum{margin-left:4px}
.infobox{background:rgba(0,229,160,.04);border:1px solid rgba(0,229,160,.15);border-radius:8px;padding:8px;margin-top:6px}
.irow{display:flex;justify-content:space-between;font-size:9px;font-family:var(--mono);padding:3px 0;border-bottom:1px dashed rgba(255,255,255,.05)}
.irow:last-child{border-bottom:none}
.mkt-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.mkt-card:hover{border-color:var(--green);transform:translateX(2px)}
.mkt-card.active{border-color:var(--green);background:rgba(0,229,160,.03)}
.mkt-title{font-size:10px;font-weight:500;margin-bottom:4px;line-height:1.3}
.mkt-meta{display:flex;justify-content:space-between;align-items:center;font-size:8px;font-family:var(--mono);color:var(--muted)}
.mkt-price{font-size:11px;font-weight:700;font-family:var(--mono)}
.mkt-price.yes{color:var(--green)}.mkt-price.no{color:var(--red)}
.mkt-vol{color:var(--amber)}
.pizzint-card{background:linear-gradient(135deg,rgba(255,107,53,.08),rgba(255,210,63,.04));border:1px solid rgba(255,107,53,.2);border-radius:10px;padding:10px}
.defcon-bar{display:flex;gap:2px;margin:8px 0}
.defcon-seg{flex:1;height:6px;border-radius:3px;background:var(--border2);transition:all .2s}
.defcon-seg.active{background:var(--pizza);box-shadow:0 0 8px var(--pizza)}
.defcon-seg.active.warn{background:var(--amber)}
.defcon-seg.active.alert{background:var(--red)}
.hist-item{padding:6px 0;border-bottom:1px dashed var(--border2);font-size:9px}
.hist-item:last-child{border-bottom:none}
.hist-date{color:var(--muted);font-family:var(--mono);font-size:8px}
.hist-event{margin:2px 0;font-weight:500}
.hist-pnl{color:var(--green);font-family:var(--mono)}
.sugg-card{background:var(--card);border-left:3px solid var(--cyan);border-radius:8px;padding:8px;margin-bottom:6px}
.sugg-card.pizza{border-left-color:var(--pizza)}.sugg-card.copy{border-left-color:var(--purple)}
.sugg-reason{font-size:8px;font-family:var(--mono);color:var(--muted);margin:4px 0 6px;line-height:1.5}
.sugg-action{display:flex;gap:4px}
.sugg-btn{flex:1;padding:5px;border:none;border-radius:6px;font-size:8px;font-weight:700;cursor:pointer}
.sugg-btn.buy{background:rgba(0,229,160,.15);color:var(--green)}.sugg-btn.sell{background:rgba(255,77,109,.15);color:var(--red)}
.crypto-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--border2)}
.crypto-row:last-child{border-bottom:none}
.crypto-name{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:500}
.crypto-icon{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.crypto-icon.btc{background:#f7931a;color:#fff}.crypto-icon.eth{background:#627eea;color:#fff}
.crypto-icon.sol{background:#00d4aa;color:#000}.crypto-icon.bnb{background:#f0b90b;color:#000}
.crypto-change{font-family:var(--mono);font-size:9px}
.crypto-change.up{color:var(--green)}.crypto-change.down{color:var(--red)}
.trader-card{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px dashed var(--border2)}.trader-card:last-child{border-bottom:none}
.trader-avatar{width:28px;height:28px;border-radius:50%;background:var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.trader-info{flex:1}
.trader-name{font-size:10px;font-weight:500}
.trader-stats{font-size:8px;font-family:var(--mono);color:var(--muted)}
.trader-wr{color:var(--green);font-weight:700}
.trader-copy{padding:4px 10px;border:none;border-radius:6px;font-size:8px;font-weight:700;cursor:pointer;background:var(--border2);color:var(--text);transition:all .15s}
.trader-copy:hover{background:var(--green);color:#000}
.trader-copy.active{background:var(--green);color:#000}
.bot-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.bot-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;cursor:pointer;transition:all .15s;text-align:center}
.bot-card:hover{border-color:var(--green)}
.bot-card.active{border-color:var(--green);background:rgba(0,229,160,.04)}
.bot-icon{font-size:16px;margin-bottom:4px}
.bot-name{font-size:9px;font-weight:500;margin-bottom:2px}
.bot-status{font-size:7px;font-family:var(--mono);color:var(--muted)}
.bot-status.on{color:var(--green)}.bot-status.off{color:var(--red)}
.pos-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--border2);font-size:9px}
.pos-row:last-child{border-bottom:none}
.pos-mkt{flex:1;font-weight:500;margin-right:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pos-side{padding:2px 6px;border-radius:4px;font-size:8px;font-weight:700;margin-right:6px}
.pos-side.yes{background:rgba(0,229,160,.15);color:var(--green)}.pos-side.no{background:rgba(255,77,109,.15);color:var(--red)}
.pos-val{font-family:var(--mono);font-weight:500}
.pos-pnl{font-family:var(--mono);font-weight:700}
.pos-pnl.g{color:var(--green)}.pos-pnl.r{color:var(--red)}
.pos-close{padding:3px 8px;border:none;border-radius:4px;font-size:8px;cursor:pointer;background:var(--border2);color:var(--text)}
.pos-close:hover{background:var(--red);color:#fff}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:8px}
.rep-pnl{font-size:16px;font-weight:700;font-family:var(--mono)}
.rep-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:6px}
.rstat{text-align:center;padding:6px 4px;background:rgba(255,255,255,.02);border-radius:6px}
.rstat-lbl{font-size:8px;font-family:var(--mono);color:var(--muted);margin-bottom:2px}
.rstat-val{font-size:11px;font-weight:700;font-family:var(--mono)}
.chart-wrap{height:120px;margin:8px 0;position:relative}
.chart-canvas{width:100%;height:100%}
.log-entry{padding:4px 0;border-bottom:1px dashed var(--border2);font-size:8px;font-family:var(--mono);display:flex;gap:6px}
.log-entry:last-child{border-bottom:none}
.log-time{color:var(--muted2);min-width:42px}
.log-msg{flex:1}.log-msg.c{color:var(--cyan)}.log-msg.g{color:var(--green)}.log-msg.r{color:var(--red)}.log-msg.b{color:var(--blue)}
.cfg-section{margin-bottom:12px}
.cfg-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--border2)}
.cfg-row:last-child{border-bottom:none}
.cfg-label{font-size:9px;color:var(--muted)}
.cfg-val{font-size:9px;font-family:var(--mono);font-weight:500}
.palette-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:6px}
.palette-swatch{width:100%;aspect-ratio:1;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.palette-swatch:hover{transform:scale(1.05)}.palette-swatch.active{border-color:var(--green);box-shadow:0 0 0 2px var(--green)}
.color-picker-wrap{display:flex;align-items:center;gap:8px;margin-top:6px}
.color-preview{width:32px;height:32px;border-radius:8px;border:1px solid var(--border2)}
.color-input{flex:1}.btn-row{display:flex;gap:6px;margin-top:8px}
.btn-row .btn{flex:1;padding:7px;font-size:9px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:12px}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;max-width:380px;width:100%;max-height:90vh;overflow-y:auto}
.bal-edit-modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px;max-width:380px;width:100%}
.bal-edit-title{font-size:14px;font-weight:700;margin-bottom:4px}
.bal-edit-sub{font-size:9px;font-family:var(--mono);color:var(--muted);margin-bottom:10px;line-height:1.6}
.bal-input-wrap{position:relative;margin-bottom:8px}
.bal-input-prefix{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-family:var(--mono);color:var(--muted);font-size:13px}
.bal-input{width:100%;padding:10px 10px 10px 28px;border:1px solid var(--border2);border-radius:10px;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:16px;font-weight:700;text-align:left}
.bal-quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.bal-quick{padding:6px;border:1px solid var(--border2);border-radius:6px;font-size:9px;font-family:var(--mono);text-align:center;cursor:pointer;background:var(--card);transition:all .15s}
.bal-quick:hover{border-color:var(--green);color:var(--green)}
.bal-info{font-size:8px;font-family:var(--mono);color:var(--muted2);line-height:1.6;margin-bottom:10px;padding:8px;background:rgba(245,166,35,.05);border-radius:6px;border:1px solid rgba(245,166,35,.15)}
.wallet-opt{display:flex;align-items:center;gap:10px;padding:9px;border:1px solid var(--border2);border-radius:10px;cursor:pointer;margin-bottom:6px;transition:all .15s}
.wallet-opt:hover{border-color:var(--green);background:rgba(0,229,160,.03)}
.wallet-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.approve-detail{background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:10px;margin:10px 0;font-size:9px;font-family:var(--mono)}
.apr-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed var(--border2)}
.apr-row:last-child{border-bottom:none}
.apr-row span:last-child{font-weight:500;text-align:right}
.weather-opportunity{background:rgba(34,211,238,.05);border:1px solid rgba(34,211,238,.2);border-radius:8px;padding:8px;margin:6px 0}
.weather-opportunity.bullish{border-left:3px solid var(--green)}.weather-opportunity.bearish{border-left:3px solid var(--red)}
.weather-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.weather-details{font-size:8px;font-family:var(--mono);color:var(--muted);line-height:1.6}
.weather-prob{display:flex;gap:8px;margin-top:4px}
.prob-item{text-align:center;flex:1;padding:4px;background:rgba(255,255,255,.03);border-radius:4px}
.prob-label{font-size:7px;color:var(--muted);margin-bottom:2px}
.prob-value{font-size:10px;font-weight:700;font-family:var(--mono)}
.prob-value.real{color:var(--green)}.prob-value.market{color:var(--amber)}.prob-value.div{color:var(--cyan)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease-out}
@media(max-width:430px){.phone{border-radius:0;border:none;box-shadow:none}}
</style>
</head>
<body>
<div class="phone">
<!-- Topbar -->
<div class="topbar">
  <div class="logo-wrap">
    <div class="logo-dot"></div>
    <span class="logo">PolyTrader</span>
    <div style="display:flex;align-items:center;border-radius:20px;overflow:hidden;border:1px solid var(--border2);font-family:var(--mono);font-size:9px;font-weight:700">
